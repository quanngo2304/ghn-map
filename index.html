<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHN Map - Bản đồ vận hành</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="src/style.css" />
</head>
<body>
    <div id="map"></div>

    <!-- Mobile toggle button -->
    <button id="controls-toggle" onclick="toggleControls()">Menu</button>

    <!-- Controls Panel -->
    <div id="controls">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;border-bottom:2px solid #e74c3c;padding-bottom:6px;">
            <h3 style="margin:0;border:none;padding:0">GHN Map</h3>
            <div style="display:flex;gap:4px;">
                <button class="view-btn" onclick="saveView()" title="Lưu view hiện tại">Lưu</button>
                <button class="view-btn" onclick="resetView()" title="Reset về mặc định">Reset</button>
            </div>
        </div>

        <!-- Toggle trước/sau sáp nhập -->
        <div class="control-group">
            <label>Ranh giới hành chính</label>
            <div class="toggle-btn-group">
                <button id="btn-sau" class="toggle-btn" onclick="switchMode('sau')">Sau sáp nhập (34)</button>
                <button id="btn-truoc" class="toggle-btn active" onclick="switchMode('truoc')">Trước sáp nhập (63)</button>
            </div>
        </div>

        <!-- Drill-down level -->
        <div class="control-group">
            <label>Hiển thị tới cấp</label>
            <select id="level-select" onchange="changeLevel(this.value)">
                <option value="tinh">Tỉnh / Thành phố</option>
                <option value="huyen">Quận / Huyện</option>
                <option value="xa">Phường / Xã</option>
            </select>
        </div>

        <!-- Color by group -->
        <div class="control-group">
            <label>Tô màu vùng</label>
            <div class="toggle-btn-group">
                <button id="btn-color-auto" class="toggle-btn small active" onclick="switchColorGroup('auto')">Tự động</button>
                <button id="btn-color-buucuc" class="toggle-btn small" onclick="switchColorGroup('buucuc')">Theo bưu cục</button>
            </div>
        </div>

        <!-- Heatmap toggle -->
        <div class="control-group">
            <label>Heatmap</label>
            <div class="toggle-btn-group">
                <button id="btn-heatmap-off" class="toggle-btn small active" onclick="toggleHeatmap('off')">Tắt</button>
                <button id="btn-heatmap-dancu" class="toggle-btn small" onclick="toggleHeatmap('dancu')">Mật độ dân cư</button>
                <button id="btn-heatmap-sanluong" class="toggle-btn small" onclick="toggleHeatmap('sanluong')">Sản lượng</button>
            </div>
        </div>

        <!-- Inline legend for mobile (hidden on desktop) -->
        <div id="mobile-legend" class="control-group mobile-only" style="display:none">
            <div id="mobile-legend-content"></div>
        </div>

        <!-- Pin bưu cục toggle -->
        <div class="control-group">
            <label>
                <input type="checkbox" id="chk-buucuc" onchange="togglePostOffices(this.checked)" checked />
                Hiển thị bưu cục
            </label>
            <label style="margin-left:12px">
                <input type="checkbox" id="chk-labels" onchange="toggleLabels(this.checked)" />
                Hiện tên
            </label>
            <div style="margin-top:4px">
                <label style="font-weight:400;font-size:12px">Màu pin:</label>
                <select id="pin-color-select" onchange="switchPinColor(this.value)" style="margin-top:2px">
                    <option value="category" selected>Theo loại</option>
                    <option value="am">Theo AM</option>
                </select>
            </div>
        </div>

        <!-- Region filter -->
        <div class="control-group">
            <label>Lọc vùng</label>
            <div id="region-filter"></div>
        </div>

        <!-- Province filter -->
        <div class="control-group">
            <label>Lọc tỉnh/thành</label>
            <div id="province-filter"></div>
        </div>

        <!-- Search -->
        <div class="control-group">
            <input type="text" id="search-input" placeholder="Tìm tỉnh, huyện, xã, bưu cục, AM..." oninput="handleSearch(this.value)" />
            <div id="search-results"></div>
        </div>

        <!-- Info panel -->
        <div id="info-panel" style="display:none">
            <div id="info-content"></div>
            <button onclick="closeInfo()" class="close-btn">Đóng</button>
        </div>

    </div>

    <!-- Legends - fixed bottom left on map, stacked -->
    <div id="map-legends">
        <div id="pin-legend-static"></div>
        <div id="legend" style="display:none">
            <div id="legend-content"></div>
        </div>
    </div>

    <!-- Loading overlay -->
    <div id="loading">
        <div class="spinner"></div>
        <p>Đang tải bản đồ...</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>
    <script src="src/map.js"></script>
</body>
</html>
